<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | ContactHub</title>

    <link rel="stylesheet" href="css/signup.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- LEFT -->

    <div class="left-panel">

        <div class="content">

            <i class="fa-solid fa-address-book logo-icon"></i>

            <h1>ContactHub</h1>

            <h2>Create Your Account</h2>

            <p>

                Join ContactHub and securely manage all your personal and
                professional contacts anywhere, anytime.

            </p>

        </div>

    </div>



    <!-- RIGHT -->

    <div class="right-panel">

        <form id="signupForm">

            <h2>Create Account</h2>

            <p class="sub-title">

                Welcome! Please enter your details.

            </p>


            <div class="input-box">

                <label>Full Name</label>

                <input
                    type="text"
                    id="fullName"
                    placeholder="Enter your full name">

            </div>


            <div class="input-box">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email">

            </div>


            <div class="input-box">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create password">

            </div>


            <div class="input-box">

                <label>Confirm Password</label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm password">

            </div>


            <div class="checkbox">

    <input type="checkbox" id="terms">

    <label for="terms">
        I agree to the
        <a href="terms.html" target="_blank">
            Terms & Conditions
        </a>
    </label>

</div>


            <button type="submit">

                Create Account

            </button>


            <p class="login-text">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </p>

        </form>

    </div>

</div>

<script type="module" src="js/signup.js"></script>

</body>
</html>
