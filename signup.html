<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | ContactHub</title>

    <link rel="stylesheet" href="css/signup.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Left Panel -->

    <div class="left-panel">

        <div class="content">

            <i class="fa-solid fa-address-book logo-icon"></i>

            <h1>ContactHub</h1>

            <h2>Create Your Account</h2>

            <p>

                Join ContactHub and securely manage all your
                personal and professional contacts anytime,
                anywhere with cloud synchronization.

            </p>

        </div>

    </div>

    <!-- Right Panel -->

    <div class="right-panel">

        <form id="signupForm" autocomplete="off">

            <h2>Create Account</h2>

            <p class="sub-title">

                Welcome! Please enter your details.

            </p>

            <!-- Full Name -->

            <div class="input-box">

                <label for="fullName">

                    Full Name

                </label>

                <input
                    type="text"
                    id="fullName"
                    placeholder="Enter your full name"
                    required>

            </div>

            <!-- Email -->

            <div class="input-box">

                <label for="email">

                    Email Address

                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <!-- Password -->

            <div class="input-box">

                <label for="password">

                    Password

                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create password"
                    minlength="6"
                    required>

            </div>

            <!-- Confirm Password -->

            <div class="input-box">

                <label for="confirmPassword">

                    Confirm Password

                </label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm password"
                    minlength="6"
                    required>

            </div>

            <!-- Terms -->

            <div class="checkbox">

                <input
                    type="checkbox"
                    id="terms"
                    required>

                <label for="terms">

                    I have read and agree to the

                    <a href="terms.html" target="_blank">

                        Terms & Conditions

                    </a>

                    and

                    <a href="privacy.html" target="_blank">

                        Privacy Policy

                    </a>

                </label>

            </div>

            <!-- Button -->

            <button type="submit">

                Create Account

            </button>

            <!-- Login -->

            <p class="login-text">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </p>

        </form>

    </div>

</div>

<script type="module" src="js/signup.js"></script>

</body>
<!-- Base approach using standard HTML5 tags -->
</html>
