<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | ContactHub</title>

    <link rel="stylesheet" href="css/auth.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="content">

            <i class="fa-solid fa-address-book logo-icon"></i>

            <h1>ContactHub</h1>

            <h2>Welcome Back</h2>

            <p>

                Login to securely access your personal dashboard,
                manage contacts, update information,
                and organize your network anytime.

            </p>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <form id="loginForm">

            <h2>Login</h2>

            <p class="sub-title">

                Welcome back! Please login to continue.

            </p>

            <div class="input-box">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-box">

                <label>Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required>

                    <i class="fa-solid fa-eye" id="togglePassword"></i>

                </div>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#" id="forgotPassword">

                    Forgot Password?

                </a>

            </div>

            <button type="submit" id="loginBtn">

                Login

            </button>

            <p class="signup-text">

                Don't have an account?

                <a href="signup.html">

                    Create Account

                </a>

            </p>

        </form>

    </div>

</div>

<script type="module" src="js/login.js"></script>

</body>

</html>
