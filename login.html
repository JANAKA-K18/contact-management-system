<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | ContactHub</title>


    <!-- Login / Authentication CSS -->

    <link rel="stylesheet"
          href="css/auth.css">


    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>


<div class="container">


    <!-- =====================================
         LEFT PANEL
    ====================================== -->

    <div class="left-panel">


        <div class="content">


            <!-- ContactHub Logo -->

            <i class="fa-solid fa-address-book logo-icon"></i>


            <!-- Application Name -->

            <h1>
                ContactHub
            </h1>


            <!-- Welcome Heading -->

            <h2>
                Welcome Back
            </h2>


            <!-- Description -->

            <p>

                Login to securely access your personal dashboard,
                manage contacts, update information,
                and organize your network anytime.

            </p>


        </div>


    </div>



    <!-- =====================================
         RIGHT PANEL
    ====================================== -->

    <div class="right-panel">


        <!-- Login Form -->

        <form id="loginForm">


            <!-- Form Heading -->

            <h2>
                Login
            </h2>


            <!-- Form Subtitle -->

            <p class="sub-title">

                Welcome back! Please login to continue.

            </p>



            <!-- =================================
                 EMAIL ADDRESS
            ================================== -->

            <div class="input-box">


                <label for="email">

                    Email Address

                </label>


                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    autocomplete="email"
                    required>


            </div>



            <!-- =================================
                 PASSWORD
            ================================== -->

            <div class="input-box">


                <label for="password">

                    Password

                </label>


                <div class="password-box">


                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required>


                    <!-- Show / Hide Password -->

                    <i
                        class="fa-solid fa-eye"
                        id="togglePassword">
                    </i>


                </div>


            </div>



            <!-- =================================
                 LOGIN OPTIONS
            ================================== -->

            <div class="options">


                <!-- Remember Me -->

                <label>

                    <input
                        type="checkbox"
                        id="rememberMe">

                    Remember Me

                </label>



                <!-- Forgot Password -->

                <a href="forgot-password.html">

                    Forgot Password?

                </a>


            </div>



            <!-- =================================
                 LOGIN BUTTON
            ================================== -->

            <button
                type="submit"
                id="loginBtn">

                Login

            </button>



            <!-- =================================
                 SIGNUP LINK
            ================================== -->

            <p class="signup-text">


                Don't have an account?


                <a href="signup.html">

                    Create Account

                </a>


            </p>


        </form>


    </div>


</div>



<!-- =====================================
     LOGIN JAVASCRIPT
====================================== -->

<script
    type="module"
    src="js/login.js">
</script>


</body>

</html>
