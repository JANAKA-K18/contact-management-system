<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Contact | ContactHub</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/add-contact.css">

    <!-- intl-tel-input CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.0/build/css/intlTelInput.css">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">
            <h2>ContactHub</h2>
        </div>

        <ul class="menu">

            <li>
                <a href="dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="add-contact.html">
                    Add Contact
                </a>
            </li>

            <li class="active">
                <a href="view-contact.html">
                    View Contacts
                </a>
            </li>

            <li>
                <a href="profile.html">
                    My Profile
                </a>
            </li>

            <li>
                <a href="#" id="logoutBtn">
                    Logout
                </a>
            </li>

        </ul>

    </aside>


    <!-- MAIN CONTENT -->

    <main class="main-content">

        <!-- PAGE HEADER -->

        <div class="page-header">

            <h1 id="pageTitle">
                Edit Contact
            </h1>

            <p id="pageDescription">
                Update the contact information below.
            </p>

        </div>


        <!-- CONTACT FORM -->

        <div class="form-container">

            <form id="editContactForm">


                <!-- FULL NAME -->

                <div class="form-row">

                    <div class="input-group">

                        <label for="fullName">
                            Full Name
                            <span class="required">*</span>
                        </label>

                        <input
                            type="text"
                            id="fullName"
                            placeholder="Enter full name"
                            required>

                    </div>

                </div>


                <!-- MOBILE NUMBER -->

                <div class="form-row">

                    <div class="input-group">

                        <label for="mobile">
                            Mobile Number
                            <span class="required">*</span>
                        </label>

                        <input
                            type="tel"
                            id="mobile"
                            required>

                        <small>
                            Select the country and enter the phone number.
                        </small>

                    </div>

                </div>


                <!-- ALTERNATE NUMBER + EMAIL -->

                <div class="form-row two-column">

                    <div class="input-group">

                        <label for="alternateMobile">
                            Alternative Number
                        </label>

                        <input
                            type="tel"
                            id="alternateMobile">

                    </div>


                    <div class="input-group">

                        <label for="email">
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="email"
                            placeholder="example@email.com">

                    </div>

                </div>


                <!-- COMPANY + DESIGNATION -->

                <div class="form-row two-column">

                    <div class="input-group">

                        <label for="company">
                            Company
                        </label>

                        <input
                            type="text"
                            id="company"
                            placeholder="Company name">

                    </div>


                    <div class="input-group">

                        <label for="designation">
                            Designation / Role
                        </label>

                        <input
                            type="text"
                            id="designation"
                            placeholder="Software Engineer">

                    </div>

                </div>


                <!-- CATEGORY -->

                <div class="form-row">

                    <div class="input-group">

                        <label for="category">
                            Category
                            <span class="required">*</span>
                        </label>

                        <select id="category" required>

                            <option value="">
                                Choose Category
                            </option>

                            <option value="Family">
                                Family
                            </option>

                            <option value="Friends">
                                Friends
                            </option>

                            <option value="Work">
                                Work
                            </option>

                            <option value="Business">
                                Business
                            </option>

                            <option value="College">
                                College
                            </option>

                            <option value="Others">
                                Others
                            </option>

                        </select>

                    </div>

                </div>


                <!-- BIRTHDAY + ADDRESS -->

                <div class="form-row two-column">

                    <div class="input-group">

                        <label for="birthday">
                            Birthday
                        </label>

                        <input
                            type="date"
                            id="birthday">

                    </div>


                    <div class="input-group">

                        <label for="address">
                            Address
                        </label>

                        <input
                            type="text"
                            id="address"
                            placeholder="Enter address">

                    </div>

                </div>


                <!-- NOTES -->

                <div class="form-row">

                    <div class="input-group">

                        <label for="notes">
                            Notes
                        </label>

                        <textarea
                            id="notes"
                            rows="4"
                            placeholder="Additional information..."></textarea>

                    </div>

                </div>


                <!-- FAVOURITE -->

                <div class="favorite-box">

                    <label class="switch">

                        <input
                            type="checkbox"
                            id="favorite">

                        <span class="slider"></span>

                    </label>

                    <span>
                        Mark as Favourite Contact
                    </span>

                </div>


                <!-- BUTTONS -->

                <div class="button-group"
                     id="editButtons">

                    <button
                        type="submit"
                        class="save-btn">

                        Update Contact

                    </button>


                    <button
                        type="button"
                        class="reset-btn"
                        id="cancelBtn">

                        Cancel

                    </button>

                </div>


                <!-- VIEW MODE BUTTON -->

                <div class="button-group"
                     id="viewButtons"
                     style="display: none;">

                    <button
                        type="button"
                        class="save-btn"
                        id="backBtn">

                        Back to Contacts

                    </button>

                </div>


            </form>

        </div>

    </main>

</div>


<!-- intl-tel-input JavaScript -->

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.0/build/js/intlTelInput.min.js"></script>


<!-- Edit Contact JavaScript -->

<script
    type="module"
    src="js/edit-contact.js">
</script>


</body>

</html>
