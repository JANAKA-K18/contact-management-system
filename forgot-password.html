<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | ContactHub</title>

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-box">

        <h1>ContactHub</h1>

        <h2>Forgot Password?</h2>

        <p>
            Enter the email address associated with your ContactHub account.
            We will send you a password reset link.
        </p>

        <form id="forgotPasswordForm">

            <div class="input-group">

                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your registered email"
                    required>

            </div>

            <button type="submit" id="resetBtn">

                Send Reset Link

            </button>

        </form>

        <div id="message"></div>

        <p class="login-link">

            Remember your password?

            <a href="login.html">
                Back to Login
            </a>

        </p>

    </div>

</div>

<script
    type="module"
    src="js/forgot-password.js">
</script>

</body>

</html>
